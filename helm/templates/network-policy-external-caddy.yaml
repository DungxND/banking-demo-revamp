{{- if .Values.networkPolicies.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-external-to-caddy
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "banking-demo.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "banking-demo.caddy.selectorLabels" . | nindent 6 }}
  policyTypes: [Ingress]
  ingress:
    - ports:
        - { port: 80,  protocol: TCP }
        - { port: 443, protocol: TCP }
{{- end }}
