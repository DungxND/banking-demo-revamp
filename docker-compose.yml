services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:18
    container_name: banking-postgres
    environment:
      POSTGRES_DB: banking
      POSTGRES_USER: banking
      POSTGRES_PASSWORD: bankingpass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U banking"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    container_name: banking-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  nats:
    image: nats:2-alpine
    container_name: banking-nats
    ports:
      - "4222:4222"   # client connections
      - "8222:8222"   # HTTP monitoring (/healthz /varz /connz /subsz)
    # -js enables JetStream (BANKING_EVENTS stream for CQRS Tier 3).
    # JetStream state is stored in the named volume natsdata so events survive
    # container restarts. Remove -js to fall back to Core NATS only — all
    # services degrade gracefully (Tier 2 Redis pipeline still runs).
    command: ["-js", "--store_dir", "/data", "--http_port", "8222"]
    volumes:
      - natsdata:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # prometheus-nats-exporter scrapes /varz /connz /subsz and exposes
  # NATS server metrics alongside the existing service metrics.
  nats-exporter:
    image: natsio/prometheus-nats-exporter:0.20.1
    container_name: banking-nats-exporter
    command: ["-varz", "-connz", "-subz", "http://nats:8222"]
    ports:
      - "7777:7777"   # Prometheus scrape target
    depends_on:
      - nats
    restart: unless-stopped

  # ── Kong (DB-less, declarative config) ──────────────────────────────────────
  # Phase 8 routes: /api/* → api-producer, /ws → notification-service

  kong:
    image: kong:3.9
    container_name: kong-gateway
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_PROXY_LISTEN: 0.0.0.0:8000
    # Bypass Kong's Lua DNS client entirely for the two upstreams.
    # Kong checks /etc/hosts before its own DNS resolver, so these entries
    # are used without ever sending a UDP query to 10.89.1.1:53.
    # Fixed IPs match the ipam allocations in the networks: block below.
    extra_hosts:
      - "api-producer:172.30.0.10"
      - "notification-service:172.30.0.11"
    ports:
      - "8000:8000"
      - "8001:8001"
    volumes:
      - ./kong-compose.yml:/kong/kong.yml:ro
    depends_on:
      api-producer:
        condition: service_started
      notification-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ── API Producer (Phase 8 HTTP entry point) ──────────────────────────────────

  api-producer:
    build:
      context: .
      dockerfile: producer/Dockerfile
    container_name: api-producer
    environment:
      NATS_URL: nats://nats:4222
      # Instana Go sensor: connect to agent on the Docker host (gateway of this bridge).
      # Without this, the sensor defaults to localhost:42699 (container loopback) and
      # the agent never hears from the process → service stays invisible in Instana.
      INSTANA_AGENT_HOST: "172.30.0.1"
      INSTANA_SERVICE_NAME: "api-producer"
      # OTel OTLP: same host, port 4317 (configured in instana/configuration-docker-compose.yaml).
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://172.30.0.1:4317"
      OTEL_SERVICE_NAME: "api-producer"
      OTEL_RESOURCE_ATTRIBUTES: "service.namespace=banking-demo"
    networks:
      default:
        ipv4_address: "172.30.0.10"
    depends_on:
      nats:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ── Consumers ────────────────────────────────────────────────────────────────

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: auth-service
    environment:
      DATABASE_URL: postgresql://banking:bankingpass@postgres:5432/banking
      REDIS_URL: redis://redis:6379/0
      NATS_URL: nats://nats:4222
      CORS_ORIGINS: http://localhost:3000
      INSTANA_AGENT_HOST: "172.30.0.1"
      INSTANA_SERVICE_NAME: "auth-service"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://172.30.0.1:4317"
      OTEL_SERVICE_NAME: "auth-service"
      OTEL_RESOURCE_ATTRIBUTES: "service.namespace=banking-demo"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  account-service:
    build:
      context: .
      dockerfile: services/account-service/Dockerfile
    container_name: account-service
    environment:
      DATABASE_URL: postgresql://banking:bankingpass@postgres:5432/banking
      REDIS_URL: redis://redis:6379/0
      NATS_URL: nats://nats:4222
      CORS_ORIGINS: http://localhost:3000
      INSTANA_AGENT_HOST: "172.30.0.1"
      INSTANA_SERVICE_NAME: "account-service"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://172.30.0.1:4317"
      OTEL_SERVICE_NAME: "account-service"
      OTEL_RESOURCE_ATTRIBUTES: "service.namespace=banking-demo"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  transfer-service:
    build:
      context: .
      dockerfile: services/transfer-service/Dockerfile
    container_name: transfer-service
    environment:
      DATABASE_URL: postgresql://banking:bankingpass@postgres:5432/banking
      REDIS_URL: redis://redis:6379/0
      NATS_URL: nats://nats:4222
      CORS_ORIGINS: http://localhost:3000
      INSTANA_AGENT_HOST: "172.30.0.1"
      INSTANA_SERVICE_NAME: "transfer-service"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://172.30.0.1:4317"
      OTEL_SERVICE_NAME: "transfer-service"
      OTEL_RESOURCE_ATTRIBUTES: "service.namespace=banking-demo"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    container_name: notification-service
    environment:
      DATABASE_URL: postgresql://banking:bankingpass@postgres:5432/banking
      REDIS_URL: redis://redis:6379/0
      NATS_URL: nats://nats:4222
      CORS_ORIGINS: http://localhost:3000
      INSTANA_AGENT_HOST: "172.30.0.1"
      INSTANA_SERVICE_NAME: "notification-service"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://172.30.0.1:4317"
      OTEL_SERVICE_NAME: "notification-service"
      OTEL_RESOURCE_ATTRIBUTES: "service.namespace=banking-demo"
    networks:
      default:
        ipv4_address: "172.30.0.11"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ── Frontend ─────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: banking-frontend
    ports:
      - "3000:80"
    depends_on:
      kong:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  # natsdata persists JetStream stream state (BANKING_EVENTS) across restarts.
  # Without this volume, the stream is lost on container restart and account-service
  # must fall back to the DB until new transfers are published.
  natsdata:

# ── Network ────────────────────────────────────────────────────────────────────
# Kong 3.x uses its own ngx_lua DNS client that sends raw UDP to whatever
# nameserver is in /etc/resolv.conf (10.89.1.1:53 on Podman).
# On Podman networks created with "isolate: true" (the default when
# docker-compose.exe runs against Podman Desktop's Docker-compat socket),
# UDP from containers to the gateway IP is firewall-dropped, so Kong's DNS
# client always times out — even though the system resolver (getent/glibc)
# works fine via a different kernel path.
#
# Fix: assign fixed IPs to the two Kong upstreams (api-producer,
# notification-service) and inject them into Kong's /etc/hosts via
# extra_hosts. Kong reads /etc/hosts BEFORE its DNS client, so the lookup
# never hits UDP 53 at all.
#
# Fixed allocations inside 172.30.0.0/24:
#   .1  = gateway / DNS (unused by containers but reserved)
#   .2  = postgres
#   .3  = redis
#   .4  = nats
#   .5  = nats-exporter
#   .10 = api-producer      ← Kong upstream A
#   .11 = notification-svc  ← Kong upstream B
#   .20 = auth-service
#   .21 = account-service
#   .22 = transfer-service
#   .30 = kong-gateway
#   .40 = frontend
networks:
  default:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: "172.30.0.0/24"
          gateway: "172.30.0.1"
